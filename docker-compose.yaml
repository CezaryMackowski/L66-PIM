services:
  fpm:
    container_name: pim-fpm
    hostname: pim-fpm
    build:
      context: .
      dockerfile: docker/fpm/Dockerfile
      target: php-fpm-dev
    volumes:
      - .:/pim/
    user: pim-user
    extra_hosts:
        - host.docker.internal:host-gateway
    environment:
        - PHP_IDE_CONFIG=serverName=Docker
    depends_on:
      - db
      - nginx

  nginx:
    container_name: pim-nginx
    hostname: pim-nginx
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: nginx-dev
    volumes:
      - .:/pim
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"

  db:
    container_name: pim-postgres
    hostname: pim-postgres
    image: postgres:17.0-bullseye
    environment:
      POSTGRES_USER: pim
      POSTGRES_PASSWORD: pim-pass
      POSTGRES_DB: pim-db
    healthcheck:
      test: [ "CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}" ]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
